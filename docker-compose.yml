version: "3.8"

services:
  axissort:
    build: .
    image: ghcr.io/yokhoe/axissort:main
    container_name: axissort
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      - DATABASE_PATH=/app/data/axissort.db
      - SOURCE_ROOT=/photos/source
      - DESTINATION_LEFT=/photos/sorted/left
      - DESTINATION_RIGHT=/photos/sorted/right
      - DESTINATION_UP=/photos/sorted/up
      - DESTINATION_DOWN=/photos/sorted/down
      - TRASH_PATH=/photos/trash
    volumes:
      # Persistent App Data (Database)
      - ./data:/app/data

      # Photo Library Mounts
      # -----------------------------------------------------------------
      # CHANGE THE LEFT SIDE OF THE ':' TO YOUR REAL PHOTO FOLDERS
      # -----------------------------------------------------------------
      - /path/to/your/source/photos:/photos/source:rw
      - /path/to/your/sorted/photos:/photos/sorted:rw
      - /path/to/your/trash/photos:/photos/trash:rw
    restart: unless-stopped
