version: "3.8"

services:
  axissort:
    image: ghcr.io/yokhoe/axissort:main
    container_name: axissort
    ports:
      - "${APP_PORT:-3001}:3001"
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - SOURCE_ROOT=/photos/source
      - DESTINATION_LEFT=/photos/left
      - DESTINATION_RIGHT=/photos/right
      - DESTINATION_UP=/photos/up
      - DESTINATION_DOWN=/photos/down
      - TRASH_PATH=/photos/trash
      - SORT_MODE=${SORT_MODE:-auto}
    volumes:
      # Persistent App Data (Database)
      - ${DB_DATA_PATH}:/app/data

      # Photo Library Mounts (Independent absolute paths)
      - ${SOURCE_PATH}:/photos/source:rw
      - ${DEST_LEFT_PATH}:/photos/left:rw
      - ${DEST_RIGHT_PATH}:/photos/right:rw
      - ${DEST_UP_PATH}:/photos/up:rw
      - ${DEST_DOWN_PATH}:/photos/down:rw
      - ${DEST_TRASH_PATH}:/photos/trash:rw
    restart: unless-stopped
